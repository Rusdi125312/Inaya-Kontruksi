name: Keep Alive Appwrite
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Appwrite Health Endpoint
        run: |
          curl -X GET "https://sgp.cloud.appwrite.io/v1/health" \
          -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}"